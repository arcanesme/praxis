run:
  timeout: 3m
  modules-download-mode: readonly

linters:
  enable:
    # Error handling
    - errcheck
    - errchkjson
    - nilerr
    - wrapcheck
    - errorlint
    # Logic & correctness
    - govet
    - staticcheck
    - exhaustive
    - nilnil
    - copyloopvar
    - bodyclose
    - sqlclosecheck
    # Security
    - gosec
    # Maintainability
    - dupl
    - goconst
    - funlen
    - gocognit
    - unused
    - ineffassign
    - unconvert
    - misspell
    - goimports
    - gosimple
    - revive
  disable:
    - depguard

linters-settings:
  funlen:
    lines: 60
    statements: 40
  gocognit:
    min-complexity: 20
  dupl:
    threshold: 100
  goconst:
    min-len: 3
    min-occurrences: 3
  errcheck:
    check-type-assertions: true
  revive:
    rules:
      - name: exported
        disabled: false
      - name: unexported-return
        disabled: false
      - name: blank-imports
        disabled: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-use-default: false
