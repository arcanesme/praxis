target-version = "py312"
line-length = 100
fix = true

[lint]
select = [
  "E", "W",    # pycodestyle
  "F",         # pyflakes
  "I",         # isort
  "N",         # pep8-naming
  "UP",        # pyupgrade
  "S",         # bandit (security)
  "B",         # flake8-bugbear
  "A",         # flake8-builtins
  "C4",        # flake8-comprehensions
  "SIM",       # flake8-simplify
  "RUF",       # ruff-specific
]
ignore = ["E501"]  # line length handled by formatter

[lint.per-file-ignores]
"tests/**" = ["S101"]  # allow assert in tests

[format]
quote-style = "double"
indent-style = "space"
