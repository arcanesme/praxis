extends: existence
message: "AI phrasing detected: '%s' — rewrite in your natural voice."
level: warning
ignorecase: true
tokens:
  # Exhausted openers
  - "In today's"
  - "In the realm of"
  - "In an era of"
  - "In the world of"
  - "When it comes to"
  - "It's worth noting that"
  - "It's important to note"
  - "It bears mentioning"
  - "It goes without saying"
  - "Needless to say"
  - "As we all know"
  - "At the end of the day"
  - "Let's face it"
  - "The fact of the matter is"
  - "The bottom line is"
  - "The reality is"
  - "The truth is"
  - "The thing is"
  # Sycophantic filler
  - "That's a great question"
  - "That's an excellent question"
  - "Great question"
  - "Excellent question"
  - "What a great"
  - "Absolutely"
  - "That's a fantastic"
  # Filler transitions
  - "With that being said"
  - "Having said that"
  - "That said"
  - "On that note"
  - "Moving forward"
  - "Going forward"
  - "Looking ahead"
  - "To that end"
  - "In light of this"
  - "In light of the above"
  - "With this in mind"
  - "Bearing this in mind"
  - "Taking this into account"
  - "With the above in mind"
  # Performative exploration
  - "Let's explore"
  - "Let's delve"
  - "Let's unpack"
  - "Let's dive into"
  - "Let's take a closer look"
  - "Let's examine"
  - "shall we explore"
  - "shall we delve"
  # Filler conclusions
  - "In conclusion"
  - "To sum up"
  - "To summarize"
  - "In summary"
  - "All in all"
  - "By and large"
  - "On the whole"
  - "When all is said and done"
  # Performative framing
  - "It's crucial to"
  - "It's essential to"
  - "It's vital to"
  - "It's imperative to"
  - "play a crucial role"
  - "play a vital role"
  - "play a pivotal role"
  - "play an important role"
  - "serves as a testament"
  - "serves as a reminder"
  - "serves as a beacon"
  # Unnecessary hedging stacks
  - "might potentially"
  - "could potentially"
  - "may potentially"
  - "would potentially"
  - "seems to suggest"
  - "appears to indicate"
  - "tends to suggest"
