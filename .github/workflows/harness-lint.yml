name: Harness Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax check
        run: |
          for f in scripts/*.sh install.sh uninstall.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "✓ $f" || echo "✗ $f"
          done
      - name: Run harness lint
        run: bash scripts/lint-harness.sh .
