project: {{project_name}}
description: {{project_description}}
mode: compiled
version: "1.0"

# Target platforms
platforms:
  - claude-project
  - perplexity-space
  # - claude-code

# Block composition (alternative to referencing a global profile)
# Set profile to a named profile OR leave null and declare blocks directly
profile: null
blocks:
  identity: []
  domains: []
  behaviors: []
  formats: []
  skills: []
  context: []

# Knowledge files to upload alongside the system prompt
knowledge_files: []

# Knowledge packs — rendered from templates at compile time
knowledge_packs: []

# Platform-specific extras
overrides:
  perplexity_space_append:
    research_domains: |
      - Example research question
  claude_code_append:
    tech_stack: ""
    commands: ""
    git_identity: ""
    git_email: ""
    extra_notes: ""
